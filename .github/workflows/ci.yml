name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    env:
        DATABASE_URL: "file:./test.db"
        JWT_SECRET: "test-secret"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build
